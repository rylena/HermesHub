assistant:
  name: "Hermes"
  agent_url: "http://127.0.0.1:8000"
  command: null
  system_prompt: "You are Hermes, a voice assistant. Keep replies short, friendly, and easy to say out loud. Use one or two sentences unless the user asks for detail."
  request_timeout_seconds: 60
  fallback_reply: "I could not reach Hermes right now."

audio:
  sample_rate: 44100
  channels: 1
  block_ms: 80
  input_device: null

wake:
  enabled: true
  engine: "auto"
  model_names: []
  model_paths: []
  phrase: "hermes"
  aliases:
    - "hermes"
    - "her mes"
    - "her miss"
    - "her knees"
    - "harness"
    - "armies"
  inference_framework: "onnx"
  threshold: 0.5
  vad_threshold: 0.5
  cooldown_seconds: 2.0

stt:
  # Faster Whisper uses CPU int8 by default. tiny.en is the lower-latency
  # Raspberry Pi 4 option. Vosk is still used for the wake word fallback and
  # spoken "stop" interruption.
  engine: "faster_whisper"
  vosk_model_path: "models/vosk-model-en-us-0.22-lgraph"
  faster_whisper_model: "tiny.en"
  faster_whisper_device: "cpu"
  faster_whisper_compute_type: "int8"
  faster_whisper_threads: 2
  faster_whisper_beam_size: 1
  faster_whisper_language: "en"
  faster_whisper_vad_filter: false
  sherpa_model_dir: "models/sherpa-onnx-streaming-zipformer-en-20M-2023-02-17"
  sherpa_threads: 2
  sherpa_int8: true
  parakeet_model: "nvidia/parakeet-tdt-0.6b-v2"
  parakeet_device: "auto"
  parakeet_sample_rate: 16000
  max_utterance_seconds: 12
  no_command_timeout_seconds: 10
  silence_seconds: 0.7
  silence_rms: 450

conversation:
  enabled: true
  followup_timeout_seconds: 10

tts:
  piper_model_path: "voices/en_US-lessac-medium.onnx"
  piper_config_path: "voices/en_US-lessac-medium.onnx.json"
  output_wav: "data/last_reply.wav"
  speaker: null
  interrupt_enabled: true
  interrupt_phrases:
    - "stop"

sound:
  wake_chime_enabled: true
  wake_chime_wav: "data/wake_chime.wav"
  wake_chime_volume: 0.35
  ack_chime_enabled: true
  ack_chime_wav: "data/ack_chime.wav"
  ack_chime_volume: 0.28

clock:
  enabled: true
  state_path: "data/clock.json"
  ringtone_wav: "data/alarm_ringtone.wav"
  ringtone_volume: 0.55
  check_interval_seconds: 0.5
  max_ring_seconds: 300

camera:
  enabled: false
  device_index: 0
  capture_dir: "data/camera"
  include_frame_with_prompt: false
  jpeg_quality: 90
