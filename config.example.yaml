assistant:
  name: "Hermes"
  agent_url: "http://127.0.0.1:8000"
  command: null
  request_timeout_seconds: 60
  fallback_reply: "I could not reach Hermes right now."

audio:
  sample_rate: 44100
  channels: 1
  block_ms: 80
  input_device: null

wake:
  enabled: true
  engine: "auto"
  model_names: []
  model_paths: []
  phrase: "hermes"
  aliases:
    - "hermes"
    - "her mes"
    - "her miss"
    - "her knees"
    - "harness"
    - "armies"
  inference_framework: "onnx"
  threshold: 0.5
  vad_threshold: 0.5
  cooldown_seconds: 2.0

stt:
  # auto keeps Vosk on CPU/Raspberry Pi, and uses Parakeet only when CUDA + NeMo exist.
  # Set to "parakeet" on a CUDA machine after running scripts/install-parakeet.sh.
  engine: "auto"
  vosk_model_path: "models/vosk-model-en-us-0.22-lgraph"
  parakeet_model: "nvidia/parakeet-tdt-0.6b-v2"
  parakeet_device: "auto"
  parakeet_sample_rate: 16000
  max_utterance_seconds: 12
  no_command_timeout_seconds: 10
  silence_seconds: 0.7
  silence_rms: 450

conversation:
  enabled: true
  followup_timeout_seconds: 10

tts:
  piper_model_path: "voices/en_US-lessac-medium.onnx"
  piper_config_path: "voices/en_US-lessac-medium.onnx.json"
  output_wav: "data/last_reply.wav"
  speaker: null

sound:
  wake_chime_enabled: true
  wake_chime_wav: "data/wake_chime.wav"
  wake_chime_volume: 0.35
  ack_chime_enabled: true
  ack_chime_wav: "data/ack_chime.wav"
  ack_chime_volume: 0.28

camera:
  enabled: false
  device_index: 0
  capture_dir: "data/camera"
  include_frame_with_prompt: false
  jpeg_quality: 90
